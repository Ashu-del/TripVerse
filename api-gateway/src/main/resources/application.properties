spring.application.name=API-GATEWAY
server.port=8080
spring.cloud.config.enabled=false

#spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id= true
spring.cloud.gateway.server.webflux.discovery.locator.enabled=false

jwt.secret=1234567890_ABCDEF_1234567890_ABCDEF

spring.cloud.gateway.server.webflux.routes[0].id=auth-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**
eureka.client.service-url.defaultZone=http://localhost:8761/eureka


spring.cloud.gateway.server.webflux.routes[1].id=inventory-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://INVENTORY-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/inventory/**

spring.cloud.gateway.server.webflux.routes[2].id=booking-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://BOOKING-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/bookings/**

